<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة مشاريع AfneSoft</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
:root{--bg:#0f1117;--surface:#1a1d27;--card:#21253a;--border:#2e3354;--accent:#4f6ef7;--accent2:#7c5cbf;--green:#2ecc71;--yellow:#f39c12;--red:#e74c3c;--text:#e8eaf6;--muted:#8892b0;--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.logo{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats{display:flex;gap:12px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;flex:1;text-align:center}
.stat-num{font-size:24px;font-weight:900;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.toolbar{display:flex;gap:8px;margin-bottom:16px}
.btn-add{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;border-radius:10px;padding:10px 20px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;flex:1}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filter-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 14px;font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(79,110,247,0.1)}
.grid{display:grid;grid-template-columns:1fr;gap:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.card-title{font-size:17px;font-weight:700}
.card-desc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.badge-active{background:rgba(46,204,113,0.15);color:var(--green)}
.badge-dev{background:rgba(243,156,18,0.15);color:var(--yellow)}
.badge-paused{background:rgba(231,76,60,0.15);color:var(--red)}
.links{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.link-btn{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);color:var(--accent);border-radius:8px;padding:6px 12px;font-size:12px;font-family:'Cairo',sans-serif;text-decoration:none;font-weight:600}
.link-btn.landing{color:var(--accent2);border-color:var(--accent2)}
.card-actions{display:flex;gap:6px;margin-top:12px}
.icon-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:6px 12px;cursor:pointer;font-size:13px;font-family:'Cairo',sans-serif}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.2s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;padding:24px 20px;width:100%;max-width:500px;transform:translateY(100%);transition:transform 0.3s ease;max-height:90vh;overflow-y:auto}
.overlay.show .modal{transform:translateY(0)}
.modal-title{font-size:18px;font-weight:900;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
.field input,.field textarea,.field select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none}
.field textarea{resize:vertical;min-height:70px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-save{flex:1;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;border-radius:10px;padding:12px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.btn-cancel{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:12px 20px;font-family:'Cairo',sans-serif;font-size:14px;cursor:pointer}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.btn-export{background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:10px 14px;font-family:'Cairo',sans-serif;font-size:13px;cursor:pointer}
</style>
</head>
<body>
<header>
<div class="logo">AfneSoft</div>
<div style="font-size:12px;color:var(--muted)">لوحة المشاريع</div>
</header>
<div class="stats">
<div class="stat"><div class="stat-num" id="total">0</div><div class="stat-label">مشروع</div></div>
<div class="stat"><div class="stat-num" id="active-count" style="color:var(--green)">0</div><div class="stat-label">نشط</div></div>
<div class="stat"><div class="stat-num" id="dev-count" style="color:var(--yellow)">0</div><div class="stat-label">تطوير</div></div>
</div>
<div class="toolbar">
<button class="btn-add" onclick="openModal()">＋ إضافة مشروع</button>
<button class="btn-export" onclick="exportData()">💾</button>
</div>
<div class="filter-btns">
<button class="filter-btn active" onclick="setFilter('all',this)">الكل</button>
<button class="filter-btn" onclick="setFilter('نشط',this)">🟢 نشط</button>
<button class="filter-btn" onclick="setFilter('تطوير',this)">🟡 تطوير</button>
<button class="filter-btn" onclick="setFilter('متوقف',this)">🔴 متوقف</button>
</div>
<div class="grid" id="grid"></div>
<div class="overlay" id="overlay">
<div class="modal">
<div class="modal-title" id="modal-title">مشروع جديد</div>
<div class="field"><label>اسم المشروع *</label><input id="f-name" placeholder="مثال: DentaLab"/></div>
<div class="field"><label>وصف مختصر</label><input id="f-desc" placeholder="وصف التطبيق"/></div>
<div class="field"><label>رابط التطبيق</label><input id="f-app" placeholder="https://..." type="url"/></div>
<div class="field"><label>رابط صفحة الهبوط</label><input id="f-land" placeholder="https://..." type="url"/></div>
<div class="field"><label>الحالة</label><select id="f-status"><option value="نشط">🟢 نشط</option><option value="تطوير">🟡 تطوير</option><option value="متوقف">🔴 متوقف</option></select></div>
<div class="field"><label>ملاحظات</label><textarea id="f-notes" placeholder="أي معلومات مهمة..."></textarea></div>
<div class="modal-actions">
<button class="btn-save" id="btn-save">حفظ</button>
<button class="btn-cancel" id="btn-cancel">إلغاء</button>
</div>
</div>
</div>
<script>
var KEY='afnesoft_v2';
var projects=[];
var editIndex=-1;
var currentFilter='all';

function load(){
  try{var r=localStorage.getItem(KEY);projects=r?JSON.parse(r):[];}catch(e){projects=[];}
  render();
}

function save(){
  try{localStorage.setItem(KEY,JSON.stringify(projects));}catch(e){alert('خطأ في الحفظ: '+e.message);}
}

function exportData(){
  var blob=new Blob([JSON.stringify(projects,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='afnesoft-backup.json';a.click();
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  render();
}

function render(){
  var grid=document.getElementById('grid');
  var filtered=currentFilter==='all'?projects:projects.filter(function(p){return p.status===currentFilter;});
  document.getElementById('total').textContent=projects.length;
  document.getElementById('active-count').textContent=projects.filter(function(p){return p.status==='نشط';}).length;
  document.getElementById('dev-count').textContent=projects.filter(function(p){return p.status==='تطوير';}).length;
  if(filtered.length===0){grid.innerHTML='<div class="empty"><div style="font-size:48px">📂</div><div style="font-size:14px;margin-top:12px">لا توجد مشاريع بعد</div></div>';return;}
  grid.innerHTML=filtered.map(function(p){
    var i=projects.indexOf(p);
    var bc=p.status==='نشط'?'badge-active':p.status==='تطوير'?'badge-dev':'badge-paused';
    return '<div class="card"><div class="card-header"><div><div class="card-title">'+p.name+'</div>'+(p.desc?'<div class="card-desc">'+p.desc+'</div>':'')+'</div><span class="badge '+bc+'">'+p.status+'</span></div>'+(p.notes?'<div class="card-desc" style="margin-top:6px;padding:8px;background:var(--surface);border-radius:8px">'+p.notes+'</div>':'')+'<div class="links">'+(p.app?'<a class="link-btn" href="'+p.app+'" target="_blank">🔗 التطبيق</a>':'')+(p.landing?'<a class="link-btn landing" href="'+p.landing+'" target="_blank">🌐 صفحة الهبوط</a>':'')+'</div><div class="card-actions"><button class="icon-btn" onclick="editProject('+i+')">✏️ تعديل</button><button class="icon-btn" onclick="deleteProject('+i+')" style="color:var(--red)">🗑 حذف</button></div></div>';
  }).join('');
}

function openModal(index){
  editIndex=index===undefined?-1:index;
  var p=editIndex>=0?projects[editIndex]:null;
  document.getElementById('modal-title').textContent=p?'تعديل المشروع':'مشروع جديد';
  document.getElementById('f-name').value=p?p.name:'';
  document.getElementById('f-desc').value=p?p.desc:'';
  document.getElementById('f-app').value=p?p.app:'';
  document.getElementById('f-land').value=p?p.landing:'';
  document.getElementById('f-status').value=p?p.status:'نشط';
  document.getElementById('f-notes').value=p?p.notes:'';
  document.getElementById('overlay').classList.add('show');
}

function closeModal(){
  document.getElementById('overlay').classList.remove('show');
}

function editProject(i){openModal(i);}

function deleteProject(i){
  if(confirm('حذف "'+projects[i].name+'"؟')){projects.splice(i,1);save();render();}
}

function saveProject(){
  var name=document.getElementById('f-name').value.trim();
  if(!name){alert('اسم المشروع مطلوب');return;}
  var proj={
    name:name,
    desc:document.getElementById('f-desc').value.trim(),
    app:document.getElementById('f-app').value.trim(),
    landing:document.getElementById('f-land').value.trim(),
    status:document.getElementById('f-status').value,
    notes:document.getElementById('f-notes').value.trim()
  };
  if(editIndex>=0){projects[editIndex]=proj;}else{projects.unshift(proj);}
  save();closeModal();render();
}

document.getElementById('btn-save').addEventListener('click',saveProject);
document.getElementById('btn-cancel').addEventListener('click',closeModal);

load();
</script>
</body>
</html>
