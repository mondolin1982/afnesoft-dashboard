<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة مشاريع AfneSoft</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #21253a;
    --border: #2e3354;
    --accent: #4f6ef7;
    --accent2: #7c5cbf;
    --green: #2ecc71;
    --yellow: #f39c12;
    --red: #e74c3c;
    --text: #e8eaf6;
    --muted: #8892b0;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-size: 20px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    flex: 1;
    text-align: center;
  }

  .stat-num {
    font-size: 24px;
    font-weight: 900;
    color: var(--accent);
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .btn-add {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    flex: 1;
  }

  .filter-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(79,110,247,0.1);
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    position: relative;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: var(--accent); }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .card-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
  }

  .card-desc {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.5;
  }

  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .badge-active { background: rgba(46,204,113,0.15); color: var(--green); }
  .badge-dev { background: rgba(243,156,18,0.15); color: var(--yellow); }
  .badge-paused { background: rgba(231,76,60,0.15); color: var(--red); }

  .links {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--accent);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-family: 'Cairo', sans-serif;
    text-decoration: none;
    font-weight: 600;
    transition: background 0.2s;
  }

  .link-btn:hover { background: rgba(79,110,247,0.1); }
  .link-btn.landing { color: var(--accent2); border-color: var(--accent2); }
  .link-btn.landing:hover { background: rgba(124,92,191,0.1); }

  .card-actions {
    position: absolute;
    top: 12px;
    left: 12px;
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover .card-actions { opacity: 1; }

  .icon-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 7px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }

  .icon-btn:hover { color: var(--text); border-color: var(--accent); }
  .icon-btn.del:hover { color: var(--red); border-color: var(--red); }

  /* Modal */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 24px 20px;
    width: 100%;
    max-width: 500px;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    max-height: 90vh;
    overflow-y: auto;
  }

  .overlay.show .modal {
    transform: translateY(0);
  }

  .modal-title {
    font-size: 18px;
    font-weight: 900;
    margin-bottom: 20px;
    color: var(--text);
  }

  .field {
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 600;
  }

  .field input,
  .field textarea,
  .field select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus,
  .field textarea:focus,
  .field select:focus {
    border-color: var(--accent);
  }

  .field textarea { resize: vertical; min-height: 70px; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn-save {
    flex: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }

  .btn-cancel {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    padding: 12px 20px;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    cursor: pointer;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="logo">AfneSoft</div>
  <div style="font-size:12px;color:var(--muted)">لوحة المشاريع</div>
</header>

<div class="stats">
  <div class="stat">
    <div class="stat-num" id="total">0</div>
    <div class="stat-label">مشروع</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="active-count" style="color:var(--green)">0</div>
    <div class="stat-label">نشط</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="dev-count" style="color:var(--yellow)">0</div>
    <div class="stat-label">تطوير</div>
  </div>
</div>

<div class="toolbar">
  <button class="btn-add" onclick="openModal()">＋ إضافة مشروع</button>
</div>

<div class="filter-btns" style="margin-bottom:14px">
  <button class="filter-btn active" onclick="setFilter('all',this)">الكل</button>
  <button class="filter-btn" onclick="setFilter('نشط',this)">🟢 نشط</button>
  <button class="filter-btn" onclick="setFilter('تطوير',this)">🟡 تطوير</button>
  <button class="filter-btn" onclick="setFilter('متوقف',this)">🔴 متوقف</button>
</div>

<div class="grid" id="grid"></div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeIfOutside(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">مشروع جديد</div>

    <div class="field">
      <label>اسم المشروع *</label>
      <input id="f-name" placeholder="مثال: DentaLab" />
    </div>
    <div class="field">
      <label>وصف مختصر</label>
      <input id="f-desc" placeholder="مثال: نظام إدارة مختبرات الأسنان" />
    </div>
    <div class="field">
      <label>رابط التطبيق</label>
      <input id="f-app" placeholder="https://..." type="url" />
    </div>
    <div class="field">
      <label>رابط صفحة الهبوط</label>
      <input id="f-land" placeholder="https://..." type="url" />
    </div>
    <div class="field">
      <label>الحالة</label>
      <select id="f-status">
        <option value="نشط">🟢 نشط</option>
        <option value="تطوير">🟡 تطوير</option>
        <option value="متوقف">🔴 متوقف</option>
      </select>
    </div>
    <div class="field">
      <label>ملاحظات</label>
      <textarea id="f-notes" placeholder="Supabase project ID, credentials, أي معلومات مهمة..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-save" onclick="saveProject()">حفظ</button>
      <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'afnesoft_projects';
  let projects = [];
  let editIndex = -1;
  let currentFilter = 'all';

  async function load() {
    try {
      const r = await window.storage.get(STORAGE_KEY);
      projects = r ? JSON.parse(r.value) : [];
    } catch {
      projects = [];
    }
    render();
  }

  async function save() {
    await window.storage.set(STORAGE_KEY, JSON.stringify(projects));
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const grid = document.getElementById('grid');
    const filtered = currentFilter === 'all' ? projects : projects.filter(p => p.status === currentFilter);

    document.getElementById('total').textContent = projects.length;
    document.getElementById('active-count').textContent = projects.filter(p => p.status === 'نشط').length;
    document.getElementById('dev-count').textContent = projects.filter(p => p.status === 'تطوير').length;

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty">
        <div class="empty-icon">📂</div>
        <div class="empty-text">${currentFilter === 'all' ? 'لا توجد مشاريع بعد، أضف أول مشروع!' : 'لا توجد مشاريع بهذه الحالة'}</div>
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map((p, i) => {
      const realIndex = projects.indexOf(p);
      const badgeClass = p.status === 'نشط' ? 'badge-active' : p.status === 'تطوير' ? 'badge-dev' : 'badge-paused';
      return `
      <div class="card">
        <div class="card-actions">
          <button class="icon-btn" onclick="editProject(${realIndex})">✏️</button>
          <button class="icon-btn del" onclick="deleteProject(${realIndex})">🗑</button>
        </div>
        <div class="card-header">
          <div>
            <div class="card-title">${p.name}</div>
            ${p.desc ? `<div class="card-desc">${p.desc}</div>` : ''}
          </div>
          <span class="badge ${badgeClass}">${p.status}</span>
        </div>
        ${p.notes ? `<div class="card-desc" style="margin-top:6px;padding:8px;background:var(--surface);border-radius:8px;font-size:11px">${p.notes}</div>` : ''}
        <div class="links">
          ${p.app ? `<a class="link-btn" href="${p.app}" target="_blank">🔗 التطبيق</a>` : ''}
          ${p.landing ? `<a class="link-btn landing" href="${p.landing}" target="_blank">🌐 صفحة الهبوط</a>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function openModal(index = -1) {
    editIndex = index;
    const p = index >= 0 ? projects[index] : null;
    document.getElementById('modal-title').textContent = p ? 'تعديل المشروع' : 'مشروع جديد';
    document.getElementById('f-name').value = p?.name || '';
    document.getElementById('f-desc').value = p?.desc || '';
    document.getElementById('f-app').value = p?.app || '';
    document.getElementById('f-land').value = p?.landing || '';
    document.getElementById('f-status').value = p?.status || 'نشط';
    document.getElementById('f-notes').value = p?.notes || '';
    document.getElementById('overlay').classList.add('show');
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('show');
  }

  function closeIfOutside(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  function editProject(i) { openModal(i); }

  function deleteProject(i) {
    if (confirm(`حذف "${projects[i].name}"؟`)) {
      projects.splice(i, 1);
      save();
      render();
    }
  }

  async function saveProject() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { alert('اسم المشروع مطلوب'); return; }

    const proj = {
      name,
      desc: document.getElementById('f-desc').value.trim(),
      app: document.getElementById('f-app').value.trim(),
      landing: document.getElementById('f-land').value.trim(),
      status: document.getElementById('f-status').value,
      notes: document.getElementById('f-notes').value.trim(),
    };

    if (editIndex >= 0) {
      projects[editIndex] = proj;
    } else {
      projects.unshift(proj);
    }

    await save();
    closeModal();
    render();
  }

  load();
</script>
</body>
</html>
